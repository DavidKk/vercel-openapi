# Prices module schema

id: prices
name: china-prices
routePrefix: /china-prices

sidebarItems:
  - key: overview
    title: Overview
    ariaLabel: Overview
    iconName: TbCurrencyDollar
  - key: api
    title: API
    ariaLabel: API
  - key: mcp
    title: MCP tools
    ariaLabel: MCP tools
  - key: functionCalling
    title: Function Calling
    ariaLabel: Function Calling
  - key: skill
    title: Skill
    ariaLabel: Skill

apiPage:
  title: Prices REST API
  subtitle: Module currently focuses on overview and authenticated manager workflow.
  endpoints:
    - method: GET
      path: /prices
      description: Public overview page for price comparison.
    - method: GET
      path: /prices/manage
      description: Authenticated product manager page.
  playgroundComponentName: PricesApiPlayground
  playgroundImportPath: '@/app/china-prices/api/components'

mcpPage:
  title: Prices MCP tools
  subtitle: Tools exposed via MCP for listing/searching/comparing prices and authenticated product CRUD.
  tools:
    - name: list_price_lists
      description: List all product entries.
    - name: search_prices
      description: Search products by keyword.
      paramsDescription: 'q: string (required) - search keyword.'
    - name: calc_prices
      description: Calculate and compare unit prices.
    - name: create_product
      description: Create a product (requires authenticated MCP session).
    - name: update_product
      description: Update a product by id (requires authenticated MCP session).
    - name: delete_product
      description: Delete a product by id (requires authenticated MCP session).
  playgroundComponentName: PricesMcpPlayground
  playgroundImportPath: '@/app/china-prices/mcp/components'
