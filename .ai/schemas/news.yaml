# News module schema (RSS aggregation by category / region)

id: news
name: News
routePrefix: /news

sidebarItems:
  - key: overview
    title: Overview
    ariaLabel: Overview
  - key: api
    title: API
    ariaLabel: API
  - key: mcp
    title: MCP tools
    ariaLabel: MCP tools
  - key: functionCalling
    title: Function Calling
    ariaLabel: Function Calling
  - key: skill
    title: Skill
    ariaLabel: Skill

apiPage:
  title: News API
  subtitle: List RSS sources and aggregate latest items by flat list slug or legacy category/region (RSSHub-compatible feeds). HTTP paths are under `/api/news/…` (below); `/news/…` is the App Router UI.
  endpoints:
    - method: GET
      path: /api/news/sources
      description: Returns configured sources and the resolved RSSHub base URL. Optional query category, sub (when category set), region (cn|hk_tw|intl).
      exampleResponse: |
        {
          "sources": [
            {
              "id": "thepaper",
              "label": "澎湃新闻",
              "category": "general-news",
              "region": "cn",
              "rsshubPath": "/thepaper/featured",
              "defaultUrl": "https://www.thepaper.cn"
            }
          ],
          "baseUrl": "https://rsshub.app"
        }
    - method: GET
      path: /api/news/feed
      description: Prefer query `list` (flat slug, same as /news/[slug]); or legacy `category` + optional `sub`. Then maxFeeds cap. When neither is set, first maxFeeds across manifest. Merge + dedupe; optional feedCategory, feedKeyword, or feedSourceId before pagination. Query list, category, sub, region, limit, offset, maxFeeds, feedAnchor.
      exampleResponse: |
        {
          "items": [
            {
              "title": "Example headline",
              "link": "https://example.com/a",
              "publishedAt": "2025-03-21T08:00:00.000Z",
              "summary": null,
              "sourceId": "thepaper",
              "sourceLabel": "澎湃新闻",
              "category": "general-news",
              "region": "cn",
              "feedCategories": ["国内", "时政"],
              "feedKeywords": ["国务院", "政策"],
              "imageUrl": "https://cdn.example.com/cover.jpg",
              "alsoFromSources": [
                { "sourceId": "other", "sourceLabel": "另一媒体", "href": "https://other.example" }
              ],
              "platformTags": [
                { "sourceId": "thepaper", "sourceLabel": "澎湃新闻", "href": "https://www.thepaper.cn/news/1" },
                { "sourceId": "other", "sourceLabel": "另一媒体", "href": "https://other.example" }
              ]
            }
          ],
          "fetchedAt": "2025-03-21T10:00:00.000Z",
          "baseUrl": "https://rsshub.app",
          "facets": {
            "categories": [{ "value": "国内", "count": 12 }],
            "keywords": [{ "value": "政策", "count": 3 }],
            "sources": [{ "sourceId": "thepaper", "label": "澎湃新闻", "count": 5 }]
          },
          "sourceInventory": [{ "sourceId": "thepaper", "label": "澎湃新闻", "poolCount": 5, "parsedCount": 12 }]
        }
  playgroundComponentName: NewsApiPlayground
  playgroundImportPath: '@/app/news/api/components'

mcpPage:
  title: News MCP tools
  subtitle: List configured news sources and fetch aggregated feeds through MCP.
  tools:
    - name: list_news_sources
      description: List RSS sources from the manifest (optional category, sub list slug when category set, region cn|hk_tw|intl).
    - name: get_news_feed
      description: Aggregate latest news from RSS; prefer list (flat slug). Legacy category + sub when list omitted. Optional region, limit, offset, maxFeeds, feedAnchor (for offset>0), and at most one of feedCategory, feedKeyword, feedSourceId before pagination.
      paramsDescription: 'list (preferred), category + sub (legacy), region, limit, offset, maxFeeds, feedAnchor, feedCategory|feedKeyword|feedSourceId (one).'
  playgroundComponentName: NewsMcpPlayground
  playgroundImportPath: '@/app/news/mcp/components'
